{% extends 'base.html' %}

{% block navigation %}
<a href="{{ url_for('login') }}">Log out</a>
<a href="{{ url_for('view_candidates_page')}}">Add Candidates</a>
<a href="{{ url_for('view_candidates_page')}}">View Candidates</a>
<a href="/results">View Results</a>
{% endblock %}

{% block content %}
<div class="container">
    <form action="{{ url_for('users_upload') }}" method="POST" enctype="multipart/form-data">
        {{form.hidden_tag()}}
        {{form.users.label}}<br>
        <input type="file" name="file" class="form-control">
        <button type="submit" class="my-input">Upload Excel</button>

    </form>

</div>
<style>
        .container{
        background-color:#343434;
        width: 900px;
        margin: 10px auto;
        padding: 20px;
        color: white;
        border: 3px solid #ddd;
        border-radius: 15px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);

        .form-control{
        width: 40%;}

    .btn{
    width: 40%;
    border-radius: 8px;
    padding: 5px;
    background-color: #007bff;
    cursor: pointer;
    color: white;
    gap: 20px;}

    .btn:hover{
    background-color: #34495e;


</style>
{% endblock %}
